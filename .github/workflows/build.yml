name: Build & Push

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set tags for main
        if: github.ref_name == 'main'
        run: echo "TAGS=${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Set tags for dev
        if: github.ref_name == 'dev'
        run: echo "TAGS=${{ env.IMAGE }}:dev,${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
